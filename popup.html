<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.P. Journe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="watch-container">
        <div class="text-center mb-3">
            <div class="header-title">F.P. JOURNE</div>
            <div class="header-subtitle">FFC · INVENIT ET FECIT</div>
        </div>

        <div class="watch-face watch-gradient">
            <div id="minute-ring" class="absolute inset-0 rounded-full minute-ring"></div>
            <div class="red-arrow"></div>
            <div class="arrow-base"></div>
            <div class="central-axis"></div>
            
            <div class="relative z-20 w-44 h-44 drop-shadow-2xl">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                    <path d="M30 70 Q30 86 50 86 Q70 86 70 70 L65 42 L35 42 Z" fill="#8fa2b9" stroke="#2b4053" stroke-width="1.4"/>
                    <rect id="f-thumb"  x="15" y="55" width="18" height="10" rx="5" class="finger" transform="rotate(-30 25 60)" />
                    <rect id="f-index"  x="32" y="15" width="8"  height="36" rx="4" class="finger" />
                    <rect id="f-middle" x="46" y="9"  width="8"  height="42" rx="4" class="finger" />
                    <rect id="f-ring"   x="60" y="15" width="8"  height="36" rx="4" class="finger" />
                    <rect id="f-pinky"  x="74" y="25" width="8"  height="26" rx="4" class="finger" />
                    <circle cx="37" cy="24" r="1.4" fill="#eef4ff" opacity="0.7"/>
                    <circle cx="51" cy="18" r="1.4" fill="#eef4ff" opacity="0.7"/>
                </svg>
            </div>

            <div class="date-window">
                <span id="rolex-date" class="date-number">09</span>
                <span id="rolex-month" class="date-month">MAR</span>
            </div>
        </div>

        <div class="info-row">
            <div class="info-text">1300.3 cal</div>
            <div id="digital-clock" class="digital-clock">02:30</div>
            <div class="info-text">5 days</div>
        </div>
        <div id="gesture-name" class="gesture-name">victory · 2</div>
        
        <div class="footer-text">
            <span>titanium fingers</span><span>•</span><span>remontoir</span><span>•</span><span>10 cams</span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
